version: 2

sources:
  - name: snowflake_sources
    description: All the sources coming from Snowflake
    database: dbt_project
    schema: raw
    config:
      freshness:
        warn_after: {count: 900, period: day} 
        error_after: {count: 1200, period: day}
      loaded_at_query: |
        select convert_timezone('America/Los_Angeles', 'UTC', to_timestamp(max(_updated_micros))) from {{ this }}

    tables:
      - name: candidates
        description: Cadnidates list, staffing status, and their English level 
        columns:
          - name: _offset
            data_tests:
              - unique
              - not_null
          - name: candidate_id
            data_tests:
              - not_null  
          - name: primary_skill_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'skills')
                    field: id
          - name: english_level
            data_tests:
              - accepted_values:
                  values: ['A0','A1','A1+','A2','A2+','B1','B1+','B2','B2+','C1','C1+','C2','Native','Unspecified']   
          - name: job_function_id
            data_tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'job_functions')
                    field: job_function_id
          - name: _created_micros
            data_tests:
              - not_null
          - name: _updated_micros
            data_tests:
              - not_null
        config:
          freshness:
            warn_after: {count: 7, period: day} 
            error_after: {count: 30, period: day}
          loaded_at_query: |
            select convert_timezone('America/Los_Angeles', 'UTC', to_timestamp(max(_updated_micros))) from {{ this }}
      
      - name: employees
        description: Employees list, employment status, their skills, and job function
        columns:
          - name: _offset
            data_tests:
              - unique
              - not_null
          - name: employee_id
            data_tests:
              - not_null
          - name: job_function_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'job_functions')
                    field: job_function_id
          - name: primary_skill_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'skills')
                    field: id
          - name: work_start_micros
            data_tests:
              - not_null
          - name: _created_micros
            data_tests:
              - not_null
          - name: _updated_micros
            data_tests:
              - not_null
      
      - name: interviews
        description: List of interviews by candidates, interview status, and interviewers
        columns:
          - name: _offset
            data_tests:
              - unique
              - not_null
          - name: id
            data_tests:
              - not_null
          - name: candidate_id
            data_tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'candidates')
                    field: candidate_id
          - name: interviewer_id
            data_tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'employees')
                    field: employee_id
          - name: run_type
            data_tests:
              - accepted_values:
                  values: ['OFFLINE','ONLINE']
          - name: type
            data_tests:
              - accepted_values:
                  values: ['Project','Technical']
          - name: _created_micros
            data_tests:
              - not_null
          - name: _updated_micros
            data_tests:
              - not_null
        config:
          freshness:
            warn_after: {count: 365, period: day} 
            error_after: {count: 700, period: day}
          loaded_at_query: |
            select convert_timezone('America/Los_Angeles', 'UTC', to_timestamp(max(_updated_micros))) from {{ this }}
      
      - name: job_functions
        description: List of all the job functions
        columns:
          - name: _offset
            data_tests:
              - unique
              - not_null
          - name: job_function_id
            data_tests:
              - unique
              - not_null
          - name: track
            data_tests:
              - accepted_values:
                  values: ['A','B','C','O']
          - name: _created_micros
            data_tests:
              - not_null
          - name: _updated_micros
            data_tests:
              - not_null
      
      - name: skills
        description: List of all the skills
        columns:
          - name: _offset
            data_tests:
              - unique
              - not_null
          - name: id
            data_tests:
              - not_null
          - name: parent_id
            data_tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'skills')
                    field: id
          - name: _created_micros
            data_tests:
              - not_null
          - name: _updated_micros
            data_tests:
              - not_null