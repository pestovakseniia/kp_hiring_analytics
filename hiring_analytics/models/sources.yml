version: 2

sources:
  - name: snowflake_sources
    description: All the sources coming from Snowflake
    database: dbt_project
    schema: raw

    config:
      freshness:
        warn_after: {count: 900, period: day}
        error_after: {count: 1200, period: day}
      loaded_at_query: |
        select convert_timezone('America/Los_Angeles', 'UTC', to_timestamp(max(_updated_micros))) from {{ this }}

    tables:

      - name: candidates
        description: Candidates list, staffing status, and their English level

        config:
          freshness:
            warn_after: {count: 7, period: day}
            error_after: {count: 30, period: day}
          loaded_at_query: |
            select convert_timezone('America/Los_Angeles', 'UTC', to_timestamp(max(_updated_micros))) from {{ this }}

        columns:
          - name: _offset
            tests:
              - unique
              - not_null

          - name: candidate_id
            tests:
              - not_null

          - name: primary_skill_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'skills')
                    field: id

          - name: english_level
            tests:
              - accepted_values:
                  arguments:
                    values: ['A0','A1','A1+','A2','A2+','B1','B1+','B2','B2+','C1','C1+','C2','Native','Unspecified']

          - name: job_function_id
            tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'job_functions')
                    field: job_function_id

          - name: _created_micros
            tests:
              - not_null

          - name: _updated_micros
            tests:
              - not_null


      - name: employees
        description: Employees list, employment status, their skills, and job function

        columns:
          - name: _offset
            tests:
              - unique
              - not_null

          - name: employee_id
            tests:
              - not_null

          - name: job_function_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'job_functions')
                    field: job_function_id

          - name: primary_skill_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'skills')
                    field: id

          - name: work_start_micros
            tests:
              - not_null

          - name: _created_micros
            tests:
              - not_null

          - name: _updated_micros
            tests:
              - not_null


      - name: interviews
        description: List of interviews by candidates, interview status, and interviewers

        config:
          freshness:
            warn_after: {count: 365, period: day}
            error_after: {count: 700, period: day}
          loaded_at_query: |
            select convert_timezone('America/Los_Angeles', 'UTC', to_timestamp(max(_updated_micros))) from {{ this }}

        columns:
          - name: _offset
            tests:
              - unique
              - not_null

          - name: id
            tests:
              - not_null

          - name: candidate_id
            tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'candidates')
                    field: candidate_id

          - name: interviewer_id
            tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'employees')
                    field: employee_id

          - name: run_type
            tests:
              - accepted_values:
                  arguments:
                    values: ['OFFLINE','ONLINE']

          - name: type
            tests:
              - accepted_values:
                  arguments:
                    values: ['Project','Technical']

          - name: _created_micros
            tests:
              - not_null

          - name: _updated_micros
            tests:
              - not_null


      - name: job_functions
        description: List of all the job functions

        columns:
          - name: _offset
            tests:
              - unique
              - not_null

          - name: job_function_id
            tests:
              - not_null

          - name: track
            tests:
              - accepted_values:
                  arguments:
                    values: ['A','B','C','O']

          - name: _created_micros
            tests:
              - not_null

          - name: _updated_micros
            tests:
              - not_null


      - name: skills
        description: List of all the skills

        columns:
          - name: _offset
            tests:
              - unique
              - not_null

          - name: id
            tests:
              - not_null

          - name: parent_id
            tests:
              - relationships:
                  arguments:
                    to: source('snowflake_sources', 'skills')
                    field: id

          - name: url
            tests:
              - dbt_utils.not_empty_string

          - name: _created_micros
            tests:
              - not_null

          - name: _updated_micros
            tests:
              - not_null